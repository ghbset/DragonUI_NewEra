<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DragonUI — Talent Calculator</title>
<style>
  :root{
    --bg:#14110c; --panel:#1f1a12; --edge:#3a2f1d; --gold:#e6c66b; --text:#e8ddc4;
    --dim:#8a7c5e; --green:#5fbf5f; --yellow:#e6c34d; --lock:#473c28; --avail:#caa64a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:13px/1.4 "Segoe UI",system-ui,Arial,sans-serif}
  header{padding:14px 18px;border-bottom:1px solid var(--edge);background:linear-gradient(#241d12,#1a150d)}
  header h1{margin:0;font-size:18px;color:var(--gold);font-weight:600}
  header p{margin:4px 0 0;color:var(--dim)}
  .wrap{max-width:1180px;margin:0 auto;padding:16px 18px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .controls{margin-bottom:14px}
  button,select,input[type=text]{background:var(--panel);color:var(--text);border:1px solid var(--edge);
    border-radius:5px;padding:6px 10px;font-size:13px}
  button{cursor:pointer}
  button:hover:not(:disabled){border-color:var(--gold)}
  button:disabled{opacity:.45;cursor:default}
  label.file{display:inline-flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--edge);
    border-radius:5px;padding:6px 12px;cursor:pointer;color:var(--gold)}
  label.file:hover{border-color:var(--gold)}
  label.file input{display:none}
  #status{color:var(--dim)}
  #status.err{color:#e07a7a}
  #classBar{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  #classBar button.active{border-color:var(--gold);color:var(--gold);background:#2a2114}
  .totals{font-size:14px;margin:6px 0 14px}
  .totals b{color:var(--gold)}
  .trees{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap}
  .tree{background:var(--panel);border:1px solid var(--edge);border-radius:8px;padding:10px 12px 14px}
  .tree h3{margin:0 0 2px;font-size:14px;color:var(--gold);display:flex;justify-content:space-between;gap:14px}
  .tree h3 .pts{color:var(--text)}
  .grid{position:relative;margin-top:8px}
  .talent{position:absolute;width:46px;height:46px;border:2px solid var(--lock);border-radius:6px;
    background:#0e0b07 center/100% 100% no-repeat;cursor:pointer;user-select:none;
    transition:border-color .08s,box-shadow .08s}
  .talent .rank{position:absolute;right:-3px;bottom:-5px;font-size:11px;font-weight:700;line-height:15px;
    background:rgba(0,0,0,.82);border-radius:4px;padding:0 3px;color:#fff}
  .talent.s-avail{border-color:var(--avail)}
  .talent.s-partial{border-color:var(--yellow);box-shadow:0 0 6px #6b561f}
  .talent.s-max{border-color:var(--green);box-shadow:0 0 7px #2f5f2f}
  .talent.s-locked{opacity:.45;cursor:not-allowed}
  .talent.s-max .rank{color:var(--green)}
  .talent.s-partial .rank{color:var(--yellow)}
  .io{margin-top:18px;display:grid;grid-template-columns:1fr;gap:10px;max-width:760px}
  .io .line{display:flex;gap:8px;align-items:center}
  .io label{width:70px;color:var(--dim)}
  .io input[type=text]{flex:1;font-family:ui-monospace,Consolas,monospace;font-size:12px}
  .main{display:flex;gap:16px;align-items:flex-start}
  #hover{flex:0 0 280px;min-height:170px;padding:10px 12px;color:var(--dim);background:#100d08;border:1px solid var(--edge);border-radius:8px;position:sticky;top:10px;align-self:flex-start;line-height:1.55}
  .trees{flex:1;min-width:0}
  #hover b{color:var(--text)}
  .pill{display:inline-block;background:#2a2114;border:1px solid var(--edge);border-radius:10px;padding:1px 8px;color:var(--gold)}
  a{color:var(--gold)}
</style>
</head>
<body>
<header>
  <h1>DragonUI — Talent Calculator</h1>
  <p>Reads talents straight from your WoW <code>Data</code> folder — including your server's custom trees — and exports a build string the in-game addon imports.</p>
</header>

<div class="wrap">
  <div class="row controls">
    <label class="file">Select your WoW <b>Data</b> folder
      <input type="file" id="picker" webkitdirectory directory multiple>
    </label>
    <span id="status">No data loaded.</span>
  </div>

  <div class="row" id="metaRow" style="display:none">
    <label>Realm label (optional, cosmetic): </label>
    <input type="text" id="realm" placeholder="auto" style="width:160px">
    <span class="pill" id="fpPill"></span>
  </div>

  <pre id="diag" style="display:none;background:#100d08;border:1px solid var(--edge);border-radius:6px;padding:8px 10px;color:var(--dim);font-size:11px;white-space:pre-wrap;margin:0 0 12px;max-width:1000px"></pre>
  <div id="classBar"></div>
  <div class="totals" id="totals" style="display:none"></div>
  <div class="main">
    <div id="hover">Hover a talent for its description.</div>
    <div class="trees" id="trees"></div>
  </div>

  <div class="io" id="io" style="display:none">
    <div class="line"><label>Export</label><input type="text" id="exportBox" readonly onclick="this.select()"></div>
    <div class="line"><label>Import</label><input type="text" id="importBox" placeholder="paste a build string or calculator URL">
      <button id="importBtn">Load</button></div>
  </div>
</div>

<script>
/* ===== inlined: mpq.js ===== */
// mpq.js — minimal MPQ archive reader (WoW 3.3.5a, format v0/v1), browser + Node.
//
// Reads on demand via an async byte reader { size, read(offset, len) -> Promise<ArrayBuffer> } so a
// 4 GB archive never has to be loaded whole (browser: File.slice().arrayBuffer(); Node: fd read).
// Supports the file flags WoW DBCs actually use: compressed (multi-sector zlib) / stored /
// single-unit / encrypted. PKWARE-implode and bzip2 sectors throw (DBCs don't use them).
(function (root, factory) {
  var api = factory();
  if (root) root.MPQ = api;                                                 // browser global (window.MPQ)
  if (typeof module === "object" && module.exports) module.exports = api;   // Node
})(typeof globalThis !== "undefined" ? globalThis : (typeof self !== "undefined" ? self : this), function () {
  "use strict";

  // ---- MPQ crypt table + hashing (StormLib algorithm) --------------------------------------------
  var cryptTable = new Uint32Array(0x500);
  (function () {
    var seed = 0x00100001;
    for (var i1 = 0; i1 < 0x100; i1++) {
      for (var i2 = i1, n = 0; n < 5; n++, i2 += 0x100) {
        seed = (seed * 125 + 3) % 0x2aaaab;
        var t1 = seed & 0xffff;
        seed = (seed * 125 + 3) % 0x2aaaab;
        var t2 = seed & 0xffff;
        cryptTable[i2] = ((t1 << 16) | t2) >>> 0;
      }
    }
  })();

  function hashString(str, type) {
    var s1 = 0x7fed7fed, s2 = 0xeeeeeeee >>> 0;
    str = str.toUpperCase().replace(/\//g, "\\");
    for (var i = 0; i < str.length; i++) {
      var ch = str.charCodeAt(i) & 0xff;
      s1 = (cryptTable[((type << 8) + ch) >>> 0] ^ ((s1 + s2) >>> 0)) >>> 0;
      s2 = (ch + s1 + s2 + ((s2 << 5) >>> 0) + 3) >>> 0;
    }
    return s1 >>> 0;
  }

  function decryptU32(arr, key) {
    var s1 = key >>> 0, s2 = 0xeeeeeeee >>> 0;
    for (var i = 0; i < arr.length; i++) {
      s2 = (s2 + cryptTable[0x400 + (s1 & 0xff)]) >>> 0;
      var ch = (arr[i] ^ ((s1 + s2) >>> 0)) >>> 0;
      s1 = (((((~s1 << 0x15) >>> 0) + 0x11111111) >>> 0) | (s1 >>> 0x0b)) >>> 0;
      s2 = (ch + s2 + ((s2 << 5) >>> 0) + 3) >>> 0;
      arr[i] = ch >>> 0;
    }
  }

  // ---- zlib inflate via the Web Streams DecompressionStream (Node 20 + browsers) ------------------
  async function inflate(u8) {
    var ds = new DecompressionStream("deflate");
    var w = ds.writable.getWriter();
    w.write(u8); w.close();
    var r = ds.readable.getReader(), chunks = [], len = 0, c;
    for (;;) { c = await r.read(); if (c.done) break; chunks.push(c.value); len += c.value.length; }
    var out = new Uint8Array(len), o = 0;
    for (var i = 0; i < chunks.length; i++) { out.set(chunks[i], o); o += chunks[i].length; }
    return out;
  }

  var FLAG = { IMPLODE: 0x100, COMPRESS: 0x200, ENCRYPTED: 0x10000, FIX_KEY: 0x20000, SINGLE: 0x1000000, EXISTS: 0x80000000 };

  function MPQArchive() {}

  // reader: { size:Number, read(offset,len)->Promise<ArrayBuffer> }
  MPQArchive.open = async function (reader) {
    var a = new MPQArchive();
    a.reader = reader;
    // Find the 'MPQ\x1a' header (0, 0x200, 0x400, ...).
    var off = -1;
    for (var probe = 0; probe < Math.min(reader.size, 0x40000); probe += 0x200) {
      var hb = new DataView(await reader.read(probe, 4));
      if (hb.getUint32(0, true) === 0x1a51504d) { off = probe; break; }
    }
    if (off < 0) throw new Error("not an MPQ archive");
    a.archiveOffset = off;
    var h = new DataView(await reader.read(off, 32));
    a.sectorSize = 512 << h.getUint16(14, true);
    var hashPos = h.getUint32(16, true), blockPos = h.getUint32(20, true);
    a.hashCount = h.getUint32(24, true);
    a.blockCount = h.getUint32(28, true);

    a.hash = await readTable(reader, off + hashPos, a.hashCount, hashString("(hash table)", 3));
    a.block = await readTable(reader, off + blockPos, a.blockCount, hashString("(block table)", 3));
    return a;
  };

  async function readTable(reader, pos, count, key) {
    var raw = new Uint32Array(await reader.read(pos, count * 16));
    decryptU32(raw, key);
    return raw; // each entry = 4 u32
  }

  MPQArchive.prototype.findFile = function (name) {
    var n = this.hashCount;
    var start = hashString(name, 0) % n;
    var a = hashString(name, 1), b = hashString(name, 2);
    for (var i = 0; i < n; i++) {
      var e = (start + i) % n, base = e * 4;
      var blockIndex = this.hash[base + 3] >>> 0;
      if (blockIndex === 0xffffffff) return null; // empty terminator
      if (blockIndex !== 0xfffffffe && this.hash[base] === a && this.hash[base + 1] === b) {
        var bb = blockIndex * 4;
        return {
          filePos: this.block[bb] >>> 0, cSize: this.block[bb + 1] >>> 0,
          fSize: this.block[bb + 2] >>> 0, flags: this.block[bb + 3] >>> 0, name: name,
        };
      }
    }
    return null;
  };

  MPQArchive.prototype.hasFile = function (name) { return !!this.findFile(name); };

  MPQArchive.prototype.readFile = async function (name) {
    var e = this.findFile(name);
    if (!e) return null;
    if (!(e.flags & FLAG.EXISTS)) return null;
    var fileKey = 0, encrypted = !!(e.flags & FLAG.ENCRYPTED);
    if (encrypted) {
      var bn = name.replace(/^.*[\\/]/, "");
      fileKey = hashString(bn, 3) >>> 0;
      if (e.flags & FLAG.FIX_KEY) fileKey = (((fileKey + e.filePos) >>> 0) ^ e.fSize) >>> 0;
    }
    var abs = this.archiveOffset + e.filePos;

    if (e.flags & FLAG.SINGLE) {
      var raw = new Uint8Array(await this.reader.read(abs, e.cSize));
      if (encrypted) { var u = new Uint32Array(raw.buffer.slice(0, raw.length & ~3)); decryptU32(u, fileKey); raw = new Uint8Array(u.buffer); }
      return decompressSector(raw, e.fSize, e.flags);
    }

    // Stored (no COMPRESS/IMPLODE flag): there is NO sector offset table — the data is just the raw
    // fSize bytes (in sectorSize chunks). Many patch tools store DBCs uncompressed; Blizzard's are
    // zlib-compressed (which has the offset table). Read it directly.
    if (!(e.flags & (FLAG.COMPRESS | FLAG.IMPLODE))) {
      var stored = new Uint8Array(await this.reader.read(abs, e.fSize));
      if (encrypted) {
        var ss = this.sectorSize;
        for (var so0 = 0, sec = 0; so0 < stored.length; so0 += ss, sec++) {
          var nb = Math.min(ss, stored.length - so0) & ~3;
          if (nb) { var su0 = new Uint32Array(stored.buffer.slice(so0, so0 + nb)); decryptU32(su0, (fileKey + sec) >>> 0); stored.set(new Uint8Array(su0.buffer), so0); }
        }
      }
      return stored;
    }

    var numSectors = Math.ceil(e.fSize / this.sectorSize);
    var offU = new Uint32Array(await this.reader.read(abs, (numSectors + 1) * 4));
    if (encrypted) decryptU32(offU, (fileKey - 1) >>> 0);
    var out = new Uint8Array(e.fSize), written = 0;
    for (var i = 0; i < numSectors; i++) {
      var so = offU[i], eo = offU[i + 1];
      var sraw = new Uint8Array(await this.reader.read(abs + so, eo - so));
      if (encrypted) { var su = new Uint32Array(sraw.buffer.slice(0, sraw.length & ~3)); decryptU32(su, (fileKey + i) >>> 0); var merged = new Uint8Array(sraw.length); merged.set(new Uint8Array(su.buffer)); for (var k = su.length * 4; k < sraw.length; k++) merged[k] = sraw[k]; sraw = merged; }
      var expected = Math.min(this.sectorSize, e.fSize - written);
      var dec = await decompressSector(sraw, expected, e.flags);
      out.set(dec.subarray(0, expected), written);
      written += expected;
    }
    return out;
  };

  async function decompressSector(raw, expected, flags) {
    if (raw.length >= expected) return raw.subarray(0, expected); // stored (not compressed)
    if (flags & FLAG.COMPRESS) {
      var mask = raw[0], body = raw.subarray(1);
      if (mask & 0x02) return await inflate(body);   // zlib
      if (mask === 0x00) return body;                // stored with leading 0 byte
      throw new Error("unsupported MPQ compression 0x" + mask.toString(16));
    }
    if (flags & FLAG.IMPLODE) throw new Error("PKWARE-implode sectors not supported");
    return raw.subarray(0, expected);
  }

  MPQArchive.hashString = hashString;
  return MPQArchive;
});

</script>
<script>
/* ===== inlined: dbc.js ===== */
// dbc.js — WoW 3.3.5a DBC parsing + talent-tree assembly + fingerprint + Talented-format codec.
// Browser + Node. The fingerprint + codec MUST stay byte-identical to the addon
// (modules/talents/Loadouts.lua) so builds round-trip between this calculator and the in-game addon.
(function (root, factory) {
  var api = factory();
  if (root) root.DBC = api;                                                 // browser global (window.DBC)
  if (typeof module === "object" && module.exports) module.exports = api;   // Node
})(typeof globalThis !== "undefined" ? globalThis : (typeof self !== "undefined" ? self : this), function () {
  "use strict";

  // ---- generic DBC (WDBC) reader -----------------------------------------------------------------
  function parse(bytes) {
    var dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
    if (dv.getUint32(0, true) !== 0x43424457) throw new Error("not a WDBC file");
    var recordCount = dv.getUint32(4, true);
    var fieldCount = dv.getUint32(8, true);
    var recordSize = dv.getUint32(12, true);
    var stringSize = dv.getUint32(16, true);
    var recBase = 20;
    var strBase = 20 + recordCount * recordSize;
    function u32(rec, field) { return dv.getUint32(recBase + rec * recordSize + field * 4, true); }
    function f32(rec, field) { return dv.getFloat32(recBase + rec * recordSize + field * 4, true); }
    function str(off) {
      if (!off || off >= stringSize) return "";
      var s = "", b, p = strBase + off;
      while ((b = dv.getUint8(p++)) !== 0) s += String.fromCharCode(b);
      return s;
    }
    return { recordCount: recordCount, fieldCount: fieldCount, u32: u32, f32: f32, str: str };
  }

  var CLASS_BIT = {
    0x1: "WARRIOR", 0x2: "PALADIN", 0x4: "HUNTER", 0x8: "ROGUE", 0x10: "PRIEST",
    0x20: "DEATHKNIGHT", 0x40: "SHAMAN", 0x80: "MAGE", 0x100: "WARLOCK", 0x400: "DRUID",
  };
  var SPELL_NAME_FIELD = 136; // enUS SpellName_Lang in 3.3.5a Spell.dbc
  var SPELL_ICON_FIELD = 133; // SpellIconID
  var SPELL_DESC_FIELD = 170; // enUS SpellDescription_Lang
  var SPELL_DURIDX_FIELD = 40; // DurationIndex -> SpellDuration.dbc
  var EFF_BASEPOINTS = [80, 81, 82];  // EffectBasePoints[1..3]

  function secs(ms) {
    if (!ms || ms <= 0) return "0 sec";
    var s = ms / 1000;
    if (s >= 60 && s % 60 === 0) return (s / 60) + " min";
    return (Number.isInteger(s) ? s : Math.round(s * 10) / 10) + " sec";
  }

  // Comprehensive WoW tooltip placeholder substitution. `ctx` exposes per-spell lookups (closed over
  // all of Spell.dbc + SpellDuration in buildTrees): ctx.val(id,eff), ctx.durMs(id), ctx.ampMs(id,eff),
  // ctx.proc(id), ctx.stack(id), ctx.charges(id), ctx.chain(id). `selfId` = the spell being described.
  //   $sN/$SN/$mN/$MN  effect value      $/D;sN  divided        $<id>sN/$<id>mN  referenced effect value
  //   $d/$D/$<id>d      duration          $tN/$TN/$<id>tN  periodic time       $h/$<id>h  proc chance
  //   $uN/$u/$<id>u     stack count       $n/$<id>n  charges    $xN/$i/$<id>i    chain/target count
  //   ${ ... }          math expression   $g a:b;  gender       $l a:b;  plural   $b  line break
  // Anything left (radius $a, $<named> variables, and math using live stats like $AP/$SPH) is rendered
  // readably — those need live character data that doesn't exist offline.
  function substituteDesc(desc, selfId, ctx) {
    if (!desc) return "";
    function self(){ return selfId; }
    function num(v){ return (typeof v === "number" && isFinite(v)) ? v : 0; }

    // resolve a single scalar token (without the leading $), e.g. "s1", "12345d", "m2", "tN", "h"
    function scalar(tok) {
      var m;
      if ((m = tok.match(/^(\d+)?([smSM])(\d)$/)))   return String(num(ctx.val(m[1] ? +m[1] : self(), +m[3])));
      if ((m = tok.match(/^(\d+)?[dD]$/)))            return secs(ctx.durMs(m[1] ? +m[1] : self()));
      if ((m = tok.match(/^(\d+)?[tT](\d)$/)))        return secs(ctx.ampMs(m[1] ? +m[1] : self(), +m[2]));
      if ((m = tok.match(/^(\d+)?[aA](\d)?$/)))        return String(Math.round(num(ctx.radius(m[1] ? +m[1] : self(), +m[2] || 1))));
      if ((m = tok.match(/^(\d+)?[oO](\d)$/)))        return String(num(ctx.val(m[1] ? +m[1] : self(), +m[2])));
      if ((m = tok.match(/^(\d+)?h$/)))               return String(num(ctx.proc(m[1] ? +m[1] : self())));
      if ((m = tok.match(/^(\d+)?[un]$/)))            return String(num(ctx.stack(m[1] ? +m[1] : self())) || num(ctx.charges(m[1] ? +m[1] : self())));
      if ((m = tok.match(/^(\d+)?[ixX]\d?$/)))        return String(num(ctx.chain(m[1] ? +m[1] : self())));
      return null;
    }

    var out = desc;
    // 0) conditionals  $?cond[a][b] -> the first (true) branch (the common case in talent text)
    out = out.replace(/\$\?[^\[]*\[([^\]]*)\]\[([^\]]*)\]/g, "$1")
             .replace(/\$\?[^\[]*\[([^\]]*)\]/g, "$1");
    // Render an expression that still has live-stat vars: split into +/- terms; evaluate the numeric
    // ones (157*5 -> 785) and turn "coef * $STAT" into "X% of <stat>" (e.g. $RAP*0.1 -> 10% of ranged
    // attack power). Result reads like "785 plus 10% of ranged attack power".
    function evalNum(str) { try { var v = Function('"use strict";return (' + str + ')')(); return isFinite(v) ? v : null; } catch (x) { return null; } }
    function renderMath(e) {
      var terms = e.match(/[+\-]?[^+\-]+/g) || [e], parts = [];
      for (var k = 0; k < terms.length; k++) {
        var raw = terms[k].trim(), sign = "";
        if (raw[0] === "+" || raw[0] === "-") { sign = raw[0]; raw = raw.slice(1).trim(); }
        if (!raw) continue;
        var sm = raw.match(/\$<?([A-Za-z]\w*)>?/), piece;
        if (!sm) {
          var v = /^[\d.+\-*/() ]+$/.test(raw) ? evalNum(raw) : null;
          piece = (v === null) ? raw : String(Math.round(v));
        } else {
          var word = STAT_WORDS[sm[1].toLowerCase()] || sm[1];
          var coefExpr = raw.replace(/\$<?[A-Za-z]\w*>?/, "1");
          var coef = /^[\d.+\-*/() ]+$/.test(coefExpr) ? evalNum(coefExpr) : null;
          piece = (coef === null) ? raw.replace(/\$<?([A-Za-z]\w*)>?/g, function (_2, w) { return STAT_WORDS[w.toLowerCase()] || w; })
                : (coef === 1 ? "your " + word : (Math.round(coef * 1000) / 10) + "% of " + word);
        }
        parts.push(parts.length === 0 ? (sign === "-" ? "-" : "") + piece : (sign === "-" ? "minus " : "plus ") + piece);
      }
      return parts.join(" ");
    }

    // 1) math expressions ${ ... }
    out = out.replace(/\$\{([^}]*)\}/g, function (_, expr) {
      var e = expr
        .replace(/\$(\d+)?([smSM])(\d)/g, function (_2, id, c, n) { return String(num(ctx.val(id ? +id : self(), +n))); })
        .replace(/\$(\d+)?[dD]/g, function (_2, id) { return String(ctx.durMs(id ? +id : self()) / 1000); })
        .replace(/\$h/g, function () { return String(num(ctx.proc(self()))); })
        .replace(/\$[ix]\d?/g, function () { return String(num(ctx.chain(self()))); });
      if (/^[-+*/().\d\s]+$/.test(e)) {                 // pure arithmetic -> evaluate
        var r = evalNum(e); if (r !== null) return String(Math.round(r * 100) / 100);
      }
      return renderMath(e);                             // mixed numeric + live stats
    });
    // 2) divided / multiplied value  $/D;[<id>]sN  or  $*D;[<id>]sN  (s or o effect)
    out = out.replace(/\$([/*])(\d+);(\d+)?([sSoO])(\d)/g, function (_, op, D, id, c, n) {
      var v = num(ctx.val(id ? +id : self(), +n));
      return String(Math.round(op === "/" ? v / +D : v * +D));
    });
    // 3) gender / plural / line break
    out = out.replace(/\$[gG]\s*([^:;]*):([^;]*);?/g, "$1")
             .replace(/\$[lL]\s*([^:;]*):([^;]*);?/g, "$2")
             .replace(/\$b/gi, " ");
    // 4) scalar tokens $<...>  (longest match first: optional spellid, letter, optional digit)
    out = out.replace(/\$(\d+)?([a-zA-Z])(\d)?/g, function (whole, id, c, n) {
      var r = scalar((id || "") + c + (n || ""));

      if (magic !== "WDBC" && !bad){
        const pk = await peek(arch, ent);
        const fb = Array.from(bytes.slice(0,12)).map(x=>x.toString(16).padStart(2,"0")).join(" ");
        bad = `${n} from ${R.info(file)} decoded to non-DBC bytes:\n  flags=0x${(ent&&ent.flags||0).toString(16)}  sectorSize=${arch&&arch.sectorSize}  fSize=${ent&&ent.fSize}  sector0Bytes=${pk.sec0}  compressionByte=${typeof pk.byte==="number"?"0x"+pk.byte.toString(16):pk.byte}\n  decoded magic="${magic}"  firstBytes: ${fb}`;
      }
    }
    if (bad){ diag.textContent += "\n\n⚠ " + bad; setStatus("A DBC failed to decode — see diagnostics below.", true); return; }
    async function optDbc(n){ if (!R.has(DBFILES(n))) return null; try { return new Uint8Array(await R.read(DBFILES(n))); } catch (e) { return null; } }
    const durBytes = await optDbc("SpellDuration.dbc");
    const radBytes = await optDbc("SpellRadius.dbc");
    const trees = window.DBC.buildTrees(dbcBytes["Talent.dbc"], dbcBytes["TalentTab.dbc"], dbcBytes["Spell.dbc"], dbcBytes["SpellIcon.dbc"], durBytes, radBytes);

    ENGINE = { trees, locale, R };
    buildPositions();
    setStatus(`Loaded ${Object.keys(trees).length} classes (Talent.dbc → ${R.info(DBFILES("Talent.dbc"))}).`);
    el("metaRow").style.display = "";
    initClassBar();
    selectClass(Object.keys(trees).sort()[0]);
  }catch(err){
    console.error(err);
    setStatus("Error: " + err.message, true);
    diag.textContent += "\nERROR: " + err.message;
  }
});

function buildPositions(){
  POS = {};
  for (const cls in ENGINE.trees){
    const idToPos = {};
    ENGINE.trees[cls].tabs.forEach((t, ti) => t.talents.forEach((tal, i) => { idToPos[tal.id] = { tab: ti, i }; }));
    POS[cls] = { idToPos };
    if (!STATE[cls]) STATE[cls] = ENGINE.trees[cls].tabs.map(t => t.talents.map(() => 0));
  }
}

function initClassBar(){
  const bar = el("classBar"); bar.innerHTML = "";
  Object.keys(ENGINE.trees).sort().forEach(cls => {
    const b = document.createElement("button");
    b.textContent = cls.charAt(0) + cls.slice(1).toLowerCase();
    b.dataset.cls = cls;
    b.onclick = () => selectClass(cls);
    bar.appendChild(b);
  });
}

function selectClass(cls){
  CURRENT = cls;
  for (const b of el("classBar").children) b.classList.toggle("active", b.dataset.cls === cls);
  el("totals").style.display = ""; el("io").style.display = "";
  el("fpPill").textContent = "fingerprint " + ENGINE.trees[cls].fingerprint;
  render();
}

// ---- rules ----
const tree = () => ENGINE.trees[CURRENT];
const ranks = () => STATE[CURRENT];
function treePoints(tab){ return ranks()[tab].reduce((a,b)=>a+b,0); }
function totalPoints(){ return ranks().reduce((s,arr)=>s+arr.reduce((a,b)=>a+b,0),0); }
function tierUnlocked(tab, tier){ return treePoints(tab) >= tier * 5; }   // tier is 0-based (DBC)
function prereqMet(tab, i){
  const tal = tree().tabs[tab].talents[i];
  for (let k=0;k<tal.prereq.length;k++){
    const pid = tal.prereq[k]; if (!pid) continue;
    const p = POS[CURRENT].idToPos[pid]; if (!p) continue;
    const req = tal.prereqRank[k] || tree().tabs[p.tab].talents[p.i].maxRank;
    if (ranks()[p.tab][p.i] < req) return false;
  }
  return true;
}
function canAdd(tab, i){
  const tal = tree().tabs[tab].talents[i];
  if (ranks()[tab][i] >= tal.maxRank) return false;
  if (totalPoints() >= MAX_POINTS) return false;
  if (!tierUnlocked(tab, tal.tier)) return false;
  if (!prereqMet(tab, i)) return false;
  return true;
}
// remove a point + cascade out anything now-illegal
function prune(){
  let changed = true;
  while (changed){
    changed = false;
    tree().tabs.forEach((t, tab) => t.talents.forEach((tal, i) => {
      if (ranks()[tab][i] > 0 && (!tierUnlocked(tab, tal.tier) || !prereqMet(tab, i))){ ranks()[tab][i] = 0; changed = true; }
    }));
  }
}

// ---- render ----
function render(){
  const host = el("trees"); host.innerHTML = "";
  const CW = 58, CH = 58;
  tree().tabs.forEach((t, tab) => {
    const col = document.createElement("div"); col.className = "tree";
    const maxCol = Math.max(...t.talents.map(x=>x.col), 3);
    const maxTier = Math.max(...t.talents.map(x=>x.tier), 0);
    const h = document.createElement("h3");
    h.innerHTML = `<span>${t.name}</span><span class="pts" id="pts-${tab}"></span>`;
    col.appendChild(h);
    const grid = document.createElement("div"); grid.className = "grid";
    grid.style.width = (maxCol+1)*CW + "px"; grid.style.height = (maxTier+1)*CH + "px";
    t.talents.forEach((tal, i) => {
      const d = document.createElement("div"); d.className = "talent";
      d.style.left = tal.col*CW + "px"; d.style.top = tal.tier*CH + "px";
      d.innerHTML = `<span class="rank"></span>`;
      if (tal.icon) setIcon(d, tal.icon);
      d.onclick = () => { if (canAdd(tab, i)){ ranks()[tab][i]++; render(); } };
      d.oncontextmenu = (ev) => { ev.preventDefault(); if (ranks()[tab][i] > 0){ ranks()[tab][i]--; prune(); render(); } };
      d.onmouseenter = () => showHover(tab, i);
      d.dataset.tab = tab; d.dataset.i = i;
      grid.appendChild(d);
    });
    col.appendChild(grid);
    host.appendChild(col);
  });
  refresh();
}

function refresh(){
  const total = totalPoints();
  el("totals").innerHTML = `Total spent: <b>${total} / ${MAX_POINTS}</b>`;
  tree().tabs.forEach((t, tab) => { const p = el("pts-"+tab); if (p) p.textContent = treePoints(tab); });
  for (const d of document.querySelectorAll(".talent")){
    const tab = +d.dataset.tab, i = +d.dataset.i;
    const tal = tree().tabs[tab].talents[i], r = ranks()[tab][i];
    d.querySelector(".rank").textContent = r + "/" + tal.maxRank;
    let cls = "talent ";
    if (r >= tal.maxRank) cls += "s-max";
    else if (r > 0) cls += "s-partial";
    else if (tierUnlocked(tab, tal.tier) && prereqMet(tab, i)) cls += "s-avail";
    else cls += "s-locked";
    d.className = cls;
  }
  updateExport();
}

// ---- icons (BLP -> canvas -> data URL, cached by path) ----
const iconCache = {};
function setIcon(cell, iconPath){
  const cached = iconCache[iconPath];
  if (typeof cached === "string"){ if (cached) cell.style.backgroundImage = `url(${cached})`; return; }
  loadIcon(iconPath).then(url => { if (url) cell.style.backgroundImage = `url(${url})`; });
}
async function loadIcon(iconPath){
  if (typeof iconCache[iconPath] === "string") return iconCache[iconPath] || null;
  if (!ENGINE || !ENGINE.R) return null;
  try{
    const file = iconPath + ".blp";
    if (!ENGINE.R.has(file)){ iconCache[iconPath] = ""; return null; }
    const bytes = new Uint8Array(await ENGINE.R.read(file));
    const img = window.BLP.decode(bytes);
    const cv = document.createElement("canvas"); cv.width = img.width; cv.height = img.height;
    cv.getContext("2d").putImageData(new ImageData(img.rgba, img.width, img.height), 0, 0);
    const url = cv.toDataURL();
    iconCache[iconPath] = url; return url;
  }catch(e){ iconCache[iconPath] = ""; return null; }
}

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function showHover(tab, i){
  const tal = tree().tabs[tab].talents[i];
  const r = ranks()[tab][i];
  const tips = tal.tooltips || [];
  const cur = tips.length ? tips[Math.min(Math.max(1, r), tips.length) - 1] : "";
  const next = (r < tal.maxRank && tips[r]) ? tips[r] : "";
  let html = `<b>${esc(tal.name)}</b> <span style="color:var(--dim)">— rank ${r}/${tal.maxRank} · tier ${tal.tier+1}</span>`;
  if (cur) html += `<br><span style="color:var(--text)">${esc(cur)}</span>`;
  if (next && next !== cur) html += `<br><span style="color:var(--dim)">Next rank: ${esc(next)}</span>`;
  el("hover").innerHTML = html;
}

// ---- export / import (addon-compatible) ----
function counts(){ return tree().tabs.map(t => t.talents.length); }
function realmLabel(){ const v = el("realm").value.trim(); return v || (ENGINE.locale ? "CustomRealm" : "this server"); }
function updateExport(){
  const code = window.DBC.encode(CURRENT, counts(), ranks());
  const tagged = code + ":DUI=" + ENGINE.trees[CURRENT].fingerprint + ";S=" + realmLabel();
  el("exportBox").value = tagged;
}
el("importBtn").addEventListener("click", () => {
  let text = el("importBox").value.trim();
  if (!text) return;
  // strip URL + our ':' metadata
  let frag = text.match(/[#?]talent#(.+)$/) || text.match(/talent-calc[^#]*#?\/?(.+)$/);
  let code = frag ? frag[1] : text;
  const colon = code.indexOf(":"); if (colon >= 0) code = code.slice(0, colon);
  const dec = window.DBC.decode(code, counts());
  if (!dec){ setStatus("Could not read that build string.", true); return; }
  if (dec.cls && dec.cls !== CURRENT){ selectClassIfExists(dec.cls); }
  const r = ranks();
  for (let tab=0; tab<r.length; tab++) for (let i=0;i<r[tab].length;i++) r[tab][i] = (dec.ranks[tab] && dec.ranks[tab][i]) || 0;
  prune(); render();
  setStatus("Imported build for " + (dec.cls || CURRENT) + ".");
});
function selectClassIfExists(cls){ if (ENGINE.trees[cls]){ selectClass(cls); } }
</script>
</body>
